<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플립시계</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="clock-container">
        <div class="clock">
            <div class="ampm" id="ampm"></div>
            <div class="flip-card" id="hours-tens">
                <div class="card-top"><div class="card-digit">0</div></div>
                <div class="card-bottom"><div class="card-digit">0</div></div>
                <div class="flap">
                    <div class="flap-front"><div class="card-digit">0</div></div>
                    <div class="flap-back"><div class="card-digit">0</div></div>
                </div>
            </div>
            <div class="flip-card" id="hours-ones">
                <div class="card-top"><div class="card-digit">0</div></div>
                <div class="card-bottom"><div class="card-digit">0</div></div>
                <div class="flap">
                    <div class="flap-front"><div class="card-digit">0</div></div>
                    <div class="flap-back"><div class="card-digit">0</div></div>
                </div>
            </div>
            <div class="colon">:</div>
            <div class="flip-card" id="minutes-tens">
                <div class="card-top"><div class="card-digit">0</div></div>
                <div class="card-bottom"><div class="card-digit">0</div></div>
                <div class="flap">
                    <div class="flap-front"><div class="card-digit">0</div></div>
                    <div class="flap-back"><div class="card-digit">0</div></div>
                </div>
            </div>
            <div class="flip-card" id="minutes-ones">
                <div class="card-top"><div class="card-digit">0</div></div>
                <div class="card-bottom"><div class="card-digit">0</div></div>
                <div class="flap">
                    <div class="flap-front"><div class="card-digit">0</div></div>
                    <div class="flap-back"><div class="card-digit">0</div></div>
                </div>
            </div>
            <div class="colon">:</div>
            <div class="flip-card" id="seconds-tens">
                <div class="card-top"><div class="card-digit">0</div></div>
                <div class="card-bottom"><div class="card-digit">0</div></div>
                <div class="flap">
                    <div class="flap-front"><div class="card-digit">0</div></div>
                    <div class="flap-back"><div class="card-digit">0</div></div>
                </div>
            </div>
            <div class="flip-card" id="seconds-ones">
                <div class="card-top"><div class="card-digit">0</div></div>
                <div class="card-bottom"><div class="card-digit">0</div></div>
                <div class="flap">
                    <div class="flap-front"><div class="card-digit">0</div></div>
                    <div class="flap-back"><div class="card-digit">0</div></div>
                </div>
            </div>
        </div>
        <div class="date-wrapper">
            <div class="date" id="date"></div>
            <div class="calendar-panel" id="calendar-panel">
                <div class="calendar-header">
                    <button class="cal-nav" id="cal-prev">&lt;</button>
                    <span class="cal-title" id="cal-title"></span>
                    <button class="cal-nav" id="cal-next">&gt;</button>
                    <button class="cal-close" id="cal-close">&times;</button>
                </div>
                <div class="calendar-weekdays">
                    <span class="wd-sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="wd-sat">토</span>
                </div>
                <div class="calendar-days" id="cal-days"></div>
            </div>
        </div>
    </div>
    <button class="format-btn" id="format-btn">
        <svg class="format-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span id="format-text">24H</span>
    </button>
    <script src="script.js"></script>
</body>
</html>
